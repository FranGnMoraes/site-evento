<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EvenTech - Página de inscrição para eventos">
    <meta name="keywords" content="Eventos, Inscrição, Eventos Tech, Desenvolvimento de Software, Tecnologia">
    <meta name="author" content="EvenTech">
    <title>Contato</title>
</head>
<body>
    <header>
        <a href="index.html" aria-label="Voltar para a página inicial">
            <img src="images/logo.png" alt="Logo da EvenTech" width="100" height="100">
        </a>

        <h1>Contato</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="../programacao.html">Programação</a></li>
                <li><a href="../inscricao.html">Inscrição</a></li>
                <li><a href="../contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section id="form-contato" aria-label="Formulário de contato">
        <h2>Formulário de Contato</h2>
        <form action="#" method="post" aria-label="Formulário de contato">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>    
            
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

            <br><br>

            <label for="assunto">Assunto:</label>
            <select id="assunto" name="assunto" required>
                <option value="">Selecione um assunto</option>
                <option value="duvida">Dúvida</option>
                <option value="sugestao">Sugestão</option>
                <option value="reclamacao">Reclamação</option>
                <option value="outro">Outro</option>
            </select>

            <br><br>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="4" cols="50" placeholder="Digite sua mensagem aqui..." required></textarea>

            <br><br>

            <button type="submit" aria-label="Enviar Mensagem">Enviar Mensagem</button>
            <button type="reset" aria-label="Limpar Formulário">Limpar Formulário</button>

            <hr>

        </form>

    </section>

    <footer>
        &copy; 2026 EvenTech. Todos os direitos reservados.
    </footer>
</body>
</html>
